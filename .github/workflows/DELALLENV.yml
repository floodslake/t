name: Delete All Environments
on:
  workflow_dispatch:

jobs:
  delete-all:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Delete all environments via GH CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Get the list of all environment names
          # 2. Loop through and delete each one
          environments=$(gh api repos/${{ github.repository }}/environments --jq '.environments[].name')
          
          for env in $environments; do
            echo "Deleting environment: $env"
            gh api --method DELETE repos/${{ github.repository }}/environments/$env
          done
