name: Delete All Environments
on:
  workflow_dispatch: # Allows you to trigger this manually

jobs:
  delete-environments:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Delete all deployment environments
        uses: strac-io/delete-deployment-environment@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Use '*' to match all environment names
          environment: '*'
          # This ensures it deletes the environment record, not just the deployment
          only-remove-deployments: false
