name: Delete All Environments
on:
  workflow_dispatch: 

jobs:
  delete-environments:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Delete all deployment environments
        uses: strumwolf/delete-deployment-environment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: '*'
          # This tells the action to delete the environment itself, 
          # not just the deployment history.
          onlyRemoveDeployments: false
