name: Delete All Environments
on:
  workflow_dispatch:

jobs:
  delete-all:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Delete all environments via GH CLI
        env:
          GH_TOKEN: ${{ secrets.ENV_DELETE_TOKEN }}
        run: |
          environments=$(gh api --paginate repos/${{ github.repository }}/environments --jq '.environments[].name')
          
          for env in $environments; do
            echo "Deleting environment: $env"
            gh api --method DELETE "repos/${{ github.repository }}/environments/$env" || echo "Failed to delete $env"
            sleep 0.5
          done
